<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DATA VIZ | Mochi</title>
    
    <!-- Pulling in Pixel and Coding Fonts from Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        /* Chill minimal gaming purplish-pinkish gradient */
        background: linear-gradient(135deg, #1A0833 0%, #4D1A4D 50%, #9B3D69 100%);
      }

      canvas {
        display: block;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
  </head>
  <body>
    <script>
      let titleColor = '#E6FF00';     
      let subtitleColor = '#FFB3FF';  // Softened the pink so it vibes with the gradient
      let whiteText = '#E0E0FF';      
      
      let stars = [];

      function setup() {
        createCanvas(windowWidth, windowHeight);
        noStroke();
        
        // Generate stars scattered mostly on the right side of the screen
        for(let i = 0; i < 40; i++) {
          stars.push({
            x: random(width * 0.4, width), // Starts from 40% across the screen
            y: random(0, height),
            size: random(2, 4),
            twinkleSpeed: random(0.02, 0.05),
            offset: random(0, TWO_PI)
          });
        }
      }

      function draw() {
        // clear() makes the canvas transparent so the CSS gradient shows through!
        clear();
        
        drawStars();
        
        // Draw Moon on the right side (responsive to screen width)
        drawPixelMoon(width * 0.8, height * 0.2, 1.5); 
        
        // Draw the text
        push();
        translate(80, 120);

        // --- BIG TITLE ---
        fill(titleColor);
        textFont('Press Start 2P'); 
        textStyle(NORMAL);
        textSize(55); 
        text('DATA VIZ', 0, 0);

        // --- SUBTITLE (Italics applied) ---
        fill(subtitleColor);
        textFont('Space Mono');
        textStyle(ITALIC); // Makes the text italic
        textSize(22); 
        text('MochiDoes was here', 5, 60);

        // --- BODY DESCRIPTION ---
        fill(whiteText);
        textFont('Space Mono'); 
        textStyle(NORMAL); // Resets back to normal text
        textSize(16);
        textLeading(26);
        text('just a girl , chilling in data viz , surviving sem3 Ixd\n[ps- coding is coding bro]', 5, 120);

        pop();
      }

      function drawStars() {
        for (let star of stars) {
          // Math sine wave to make the stars pulse/twinkle smoothly
          let alpha = map(sin(frameCount * star.twinkleSpeed + star.offset), -1, 1, 50, 255);
          fill(255, 255, 255, alpha);
          rect(star.x, star.y, star.size, star.size);
        }
      }

      function drawPixelMoon(x, y, scaleMult) {
        push();
        translate(x, y);
        scale(scaleMult);
        fill('#FFFDD0'); // Pale, aesthetic yellow/white
        
        // A simple text-based map for drawing pixel art!
        // X = filled block, space = empty
        let moonPixels = [
          "   XXXX ",
          "  XXXXX ",
          " XXXXX  ",
          " XXXX   ",
          " XXX    ",
          " XXX    ",
          " XXX    ",
          " XXXX   ",
          " XXXXX  ",
          "  XXXXX ",
          "   XXXX "
        ];
        
        let pixelSize = 6;
        for(let row = 0; row < moonPixels.length; row++) {
          for(let col = 0; col < moonPixels[row].length; col++) {
            if (moonPixels[row].charAt(col) === 'X') {
              rect(col * pixelSize, row * pixelSize, pixelSize, pixelSize);
            }
          }
        }
        pop();
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
      }
    </script>
  </body>
</html>
